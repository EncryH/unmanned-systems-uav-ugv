services:

  # ── 송골매 UAV 시뮬레이터
  dah-uav:
    build:
      context: .                          # DAH/ 루트 기준으로 빌드
      dockerfile: simulator/uav/Dockerfile      # UAV용 Dockerfile 지정
    container_name: dah-uav
    environment:
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14560
    depends_on:
      - tactical-router
    networks:
      uav_net:
      dah-net:
        ipv4_address: 172.20.0.10         # UAV 고정 IP

  # ── Companion Computer (UAV 탑재 컴퓨터)
  dah-companion:
    build:
      context: .
      dockerfile: companion_computer/Dockerfile
    container_name: dah-companion
    environment:
      MAVLINK_PORT: 14550
      MISSION_CONTROL_URL: http://mission-control:8080
    depends_on:
      - dah-uav
      - mission-control
    networks:
      dah-net:
        ipv4_address: 172.20.0.30
      ops_net:

  # ── UGV 시뮬레이터
  dah-ugv:
    build:
      context: .
      dockerfile: simulator/ugv/Dockerfile
    container_name: dah-ugv
    environment:
      ROUTER_HOST: tactical-router
      ROUTER_PORT: 14660
      CMD_PORT: 14661
    depends_on:
      - tactical-router
    networks:
      uav_net:
      dah-net:
        ipv4_address: 172.20.0.20

  # ── TICN 전술 라우터 (UAV/UGV 텔레메트리 fan-out)
  tactical-router:
    build:
      context: .
      dockerfile: tactical_router/Dockerfile
    container_name: dah-tactical-router
    environment:
      UAV_LISTEN_PORT: 14560
      UGV_LISTEN_PORT: 14660
      MISSION_HOST: mission-control
      MISSION_PORT: 14540
      COLLECTOR_HOST: telemetry-collector
      COLLECTOR_PORT: 14541
    networks:
      - uav_net
      - ops_net

  # ── C2 / Mission Control 서버
  mission-control:
    build:
      context: .
      dockerfile: mission_control/Dockerfile
    container_name: dah-mission-control
    ports:
      - "8082:8080"
    networks:
      - ops_net

  # ── 텔레메트리 수집기
  telemetry-collector:
    build:
      context: .
      dockerfile: telemetry_collector/Dockerfile
    container_name: dah-telemetry-collector
    environment:
      LISTEN_PORT: 14541
    networks:
      - ops_net

  # ── 정찰 에이전트 (도청)
  dah-recon:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: attack_agent/Dockerfile
    container_name: dah-recon
    depends_on:
      - dah-uav                           # UAV 먼저 실행된 후 시작
    networks:
      dah-net:
        ipv4_address: 172.20.0.40         # recon 고정 IP

  # ── 공격 에이전트 (LAND 명령 주입)
  dah-executor:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: attack_agent/Dockerfile
    container_name: dah-executor
    command: ["python", "executor.py"]    # recon.py 대신 executor.py 실행
    depends_on:
      - dah-uav
    networks:
      dah-net:
        ipv4_address: 172.20.0.50         # executor 고정 IP

  # ── 방어 에이전트 (탐지 + 차단)
  dah-defense:
    profiles: ["cyber-lab"]
    build:
      context: .
      dockerfile: defense_agent/Dockerfile
    container_name: dah-defense
    depends_on:
      - dah-uav                           # UAV 먼저 실행된 후 시작
    networks:
      dah-net:
        ipv4_address: 172.20.0.60         # 방어 에이전트 고정 IP

  # ── 대시보드 + GCS (통신 구조 시각화 / 지상통제소)
  dah-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dah-dashboard
    depends_on:
      - dah-uav
      - dah-ugv
      - tactical-router
      - mission-control
      - telemetry-collector
    environment:
      MISSION_CONTROL_URL: http://mission-control:8080
      UAV_HOST: 172.20.0.10
      UAV_CMD_PORT: 14551
      UGV_HOST: 172.20.0.20
      UGV_CMD_PORT: 14661
    ports:
      - "8081:8080"
    networks:
      ops_net:
      dah-net:
        ipv4_address: 172.20.0.70

# ── 가상 네트워크
networks:
  uav_net:
    driver: bridge
  ops_net:
    driver: bridge
  dah-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24           # IP 대역 설정
